name: Sync CISA KEV
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download KEV JSON
        run: |
          curl -o data/kev.json \
            "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"

      - name: Commit if changed
        run: |
          git config user.name "kev-bot"
          git config user.email "bot@xihacks.com"
          git add data/kev.json
          git diff --staged --quiet || git commit -m "chore: update CISA KEV $(date +%Y-%m-%d)"
          git push
