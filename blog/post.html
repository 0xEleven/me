<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POST // XIHACKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<!-- Marked.js: lightweight MD parser, no install needed -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- highlight.js for code blocks -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/tomorrow-night.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root{
  --yellow:#FCE300;--cyan:#00F0FF;--magenta:#FF003C;--orange:#FF6B00;
  --bg:#04050D;--bg2:#080A16;--bg3:#0C0F1E;
  --text:#C8D8E8;--dim:#3A5068;
  --border-c:rgba(0,240,255,0.18);--border-y:rgba(252,227,0,0.25);
  --glow-y:rgba(252,227,0,0.18);--glow-c:rgba(0,240,255,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{cursor:none;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,240,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.04) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);z-index:9997;pointer-events:none;}
#cursor{position:fixed;width:18px;height:18px;pointer-events:none;z-index:99999;border:2px solid var(--yellow);transform:translate(-50%,-50%);}
#cursor::after{content:'';position:absolute;inset:3px;background:var(--yellow);opacity:0.5;}
#cursor-trail{position:fixed;width:6px;height:6px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:left 0.12s ease,top 0.12s ease;box-shadow:0 0 8px var(--cyan);}
#vhs{position:fixed;inset:0;z-index:9996;pointer-events:none;overflow:hidden;}
#vhs::before{content:'';position:absolute;left:0;right:0;height:3px;background:rgba(0,240,255,0.35);animation:vline 4s linear infinite;box-shadow:0 0 12px var(--cyan);}
@keyframes vline{0%{top:-10px;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:110%;opacity:0;}}
#cv{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.05;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:rgba(4,5,13,0.96);border-bottom:1px solid var(--border-c);backdrop-filter:blur(12px);padding:0 16px;display:flex;align-items:stretch;justify-content:space-between;}
.topbar-brand{display:flex;align-items:center;gap:12px;padding:10px 20px 10px 0;border-right:1px solid var(--border-c);flex-shrink:0;}
.brand-dots{display:flex;gap:6px;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot-r{background:#FF003C;box-shadow:0 0 8px #FF003C;}
.dot-y{background:#FCE300;box-shadow:0 0 8px #FCE300;}
.dot-g{background:#00F0FF;box-shadow:0 0 8px #00F0FF;}
.brand-txt{font-family:'Orbitron',monospace;font-weight:900;font-size:12px;color:var(--yellow);letter-spacing:0.12em;text-shadow:0 0 14px var(--yellow);}
.nav-links{display:flex;align-items:center;}
.nav-btn{background:none;border:none;border-right:1px solid var(--border-c);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.08em;padding:0 16px;height:100%;cursor:none;transition:all 0.2s;white-space:nowrap;text-transform:uppercase;position:relative;text-decoration:none;display:flex;align-items:center;}
.nav-btn::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--yellow);transform:scaleX(0);transition:transform 0.2s;}
.nav-btn:hover{color:var(--yellow);background:rgba(252,227,0,0.05);text-shadow:0 0 10px var(--yellow);}
.nav-btn:hover::before{transform:scaleX(1);}

/* SHELL */
.shell{position:relative;z-index:10;max-width:780px;margin:0 auto;padding:0 16px 100px;}

/* LOADING */
.loading{text-align:center;padding:80px 20px;}
.loading-txt{font-family:'VT323',monospace;font-size:28px;color:var(--cyan);letter-spacing:0.1em;animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* POST HEADER */
.post-header{padding:40px 0 32px;border-bottom:1px solid var(--border-c);margin-bottom:40px;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--dim);font-size:12px;text-decoration:none;letter-spacing:0.08em;margin-bottom:20px;transition:color 0.2s;cursor:none;}
.back-link:hover{color:var(--cyan);}
.back-link::before{content:'<<';color:var(--magenta);}
.post-header-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ptag{font-size:11px;padding:2px 9px;border:1px solid;letter-spacing:0.06em;}
.ptag-c{border-color:rgba(0,240,255,0.3);color:var(--cyan);}
.ptag-m{border-color:rgba(255,0,60,0.3);color:var(--magenta);}
.ptag-y{border-color:rgba(252,227,0,0.3);color:var(--yellow);}
.ptag-o{border-color:rgba(255,107,0,0.3);color:var(--orange);}
.post-header-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(20px,4vw,36px);color:var(--yellow);text-shadow:0 0 20px var(--yellow);line-height:1.2;margin-bottom:12px;}
.post-header-meta{display:flex;gap:20px;flex-wrap:wrap;font-size:11px;color:var(--dim);letter-spacing:0.08em;}
.post-header-meta span{display:flex;align-items:center;gap:6px;}
.post-header-meta em{color:var(--cyan);font-style:normal;}

/* PROGRESS BAR */
#progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--yellow));z-index:9999;width:0%;transition:width 0.1s;box-shadow:0 0 8px var(--cyan);}

/* TABLE OF CONTENTS */
.toc{border:1px solid var(--border-c);background:var(--bg2);padding:20px 24px;margin-bottom:32px;position:relative;}
.toc::before{content:'// TABLE OF CONTENTS';position:absolute;top:-10px;left:16px;background:var(--bg2);padding:0 8px;font-size:10px;color:var(--cyan);letter-spacing:0.12em;}
.toc-list{list-style:none;}
.toc-list li{padding:3px 0;}
.toc-list a{color:var(--dim);text-decoration:none;font-size:12px;transition:color 0.2s;display:flex;gap:8px;align-items:center;cursor:none;}
.toc-list a::before{content:'▸';color:var(--magenta);font-size:10px;}
.toc-list a:hover{color:var(--yellow);}
.toc-list.h3 a{padding-left:16px;font-size:11px;}

/* MARKDOWN CONTENT */
.post-content{animation:fadeIn 0.4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.post-content h1,.post-content h2,.post-content h3,.post-content h4{
  font-family:'Orbitron',monospace;font-weight:700;
  margin:36px 0 14px;line-height:1.3;
}
.post-content h1{font-size:clamp(20px,4vw,32px);color:var(--yellow);text-shadow:0 0 16px var(--yellow);border-bottom:1px solid var(--border-y);padding-bottom:10px;}
.post-content h2{font-size:clamp(16px,3vw,22px);color:var(--cyan);text-shadow:0 0 10px var(--glow-c);position:relative;padding-left:14px;}
.post-content h2::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;background:var(--cyan);}
.post-content h3{font-size:15px;color:var(--yellow);opacity:0.8;}
.post-content h4{font-size:13px;color:var(--magenta);}

.post-content p{margin:0 0 18px;color:var(--text);line-height:1.8;font-size:14px;}

.post-content a{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,240,255,0.3);transition:all 0.2s;cursor:none;}
.post-content a:hover{color:var(--yellow);border-bottom-color:var(--yellow);}

.post-content strong{color:var(--yellow);font-weight:700;}
.post-content em{color:var(--cyan);font-style:italic;}

.post-content ul,.post-content ol{margin:0 0 18px 0;padding-left:0;}
.post-content ul li,.post-content ol li{padding:4px 0 4px 20px;position:relative;font-size:14px;color:var(--text);}
.post-content ul li::before{content:'▸';position:absolute;left:0;color:var(--magenta);}
.post-content ol{counter-reset:ol;}
.post-content ol li{counter-increment:ol;}
.post-content ol li::before{content:counter(ol)'.';position:absolute;left:0;color:var(--yellow);font-weight:700;}

.post-content blockquote{
  border-left:3px solid var(--yellow);
  background:var(--bg2);padding:16px 20px;margin:24px 0;
  position:relative;
}
.post-content blockquote::before{content:'>';position:absolute;top:16px;left:-12px;color:var(--yellow);font-size:16px;background:var(--bg);}
.post-content blockquote p{margin:0;color:var(--text);font-style:italic;}

.post-content code{background:var(--bg3);color:var(--cyan);padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:12px;border:1px solid var(--border-c);}

.post-content pre{margin:20px 0;border:1px solid var(--border-c);position:relative;}
.post-content pre code{background:transparent;padding:0;border:none;color:inherit;font-size:13px;display:block;}
.post-content pre .hljs{background:var(--bg2);padding:20px;overflow-x:auto;}

/* Copy button on code blocks */
.code-wrap{position:relative;margin:20px 0;}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--bg3);border:1px solid var(--border-c);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;cursor:none;transition:all 0.2s;z-index:2;letter-spacing:0.06em;}
.copy-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.copy-btn.copied{border-color:var(--yellow);color:var(--yellow);}

.post-content table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px;}
.post-content th{background:var(--bg2);color:var(--yellow);font-family:'Orbitron',monospace;font-size:11px;letter-spacing:0.08em;padding:10px 14px;border:1px solid var(--border-c);text-align:left;}
.post-content td{padding:9px 14px;border:1px solid var(--border-c);color:var(--text);}
.post-content tr:hover td{background:rgba(0,240,255,0.03);}

.post-content hr{border:none;height:1px;background:linear-gradient(to right,transparent,var(--cyan),var(--yellow),var(--magenta),transparent);opacity:0.3;margin:32px 0;}

.post-content img{max-width:100%;border:1px solid var(--border-c);display:block;margin:20px auto;}

/* POST FOOTER */
.post-footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--border-c);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.pf-back{display:inline-flex;align-items:center;gap:8px;color:var(--cyan);text-decoration:none;font-size:12px;letter-spacing:0.08em;cursor:none;transition:color 0.2s;}
.pf-back:hover{color:var(--yellow);}
.pf-share{font-size:11px;color:var(--dim);}

/* STATUS BAR */
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--yellow);color:var(--bg);font-family:'Orbitron',monospace;font-weight:700;font-size:10px;letter-spacing:0.08em;padding:4px 16px;display:flex;justify-content:space-between;align-items:center;}
.sb-l{display:flex;align-items:center;gap:12px;overflow:hidden;}
.sb-mode{background:var(--bg);color:var(--yellow);padding:1px 8px;font-size:9px;flex-shrink:0;}
.sb-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

@media(max-width:640px){
  .nav-btn{padding:0 10px;font-size:10px;}
  .brand-txt{font-size:10px;}
  .post-content h1{font-size:20px;}
  .post-content h2{font-size:16px;}
  .post-header-title{font-size:20px;}
}
</style>
</head>
<body>
<div id="progress"></div>
<div id="cursor"></div>
<div id="cursor-trail"></div>
<div id="vhs"></div>
<canvas id="cv"></canvas>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-dots">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    </div>
    <span class="brand-txt">XIHACKS.COM</span>
  </div>
  <nav class="nav-links">
    <a href="../index.html" class="nav-btn">HOME</a>
    <a href="index.html" class="nav-btn">BLOG</a>
  </nav>
</div>

<div class="shell">
  <div id="loading" class="loading">
    <div class="loading-txt">// DECRYPTING POST...</div>
  </div>
  <div id="post-wrap" style="display:none;">
    <div class="post-header" id="post-header"></div>
    <div class="toc" id="toc" style="display:none;"></div>
    <div class="post-content" id="post-content"></div>
    <div class="post-footer">
      <a href="index.html" class="pf-back">&lt;&lt; BACK TO BLOG</a>
      <span class="pf-share">xihacks.com/blog</span>
    </div>
  </div>
  <div id="error" style="display:none;text-align:center;padding:80px 20px;">
    <div style="font-family:'VT323',monospace;font-size:64px;color:rgba(255,0,60,0.2);">404</div>
    <div style="font-size:13px;color:var(--dim);margin-top:12px;">Post not found. <a href="index.html" style="color:var(--cyan);">Return to blog.</a></div>
  </div>
</div>

<div class="statusbar">
  <div class="sb-l">
    <span class="sb-mode">READ</span>
    <span class="sb-title" id="sb-title">// LOADING POST...</span>
  </div>
  <span id="sb-clock"></span>
</div>

<script>
// CURSOR
const cur=document.getElementById('cursor'),trail=document.getElementById('cursor-trail');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';setTimeout(()=>{trail.style.left=e.clientX+'px';trail.style.top=e.clientY+'px';},80);});

// MATRIX
const cv=document.getElementById('cv'),cx=cv.getContext('2d');let drops=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;drops=Array(Math.floor(cv.width/14)).fill(1);}
rsz();addEventListener('resize',rsz);
const chs='01ABCDEF<>{}[]#$%&@';const clrs=['#FCE300','#00F0FF','#FF003C'];
function drawM(){cx.fillStyle='rgba(4,5,13,0.05)';cx.fillRect(0,0,cv.width,cv.height);drops.forEach((y,i)=>{cx.fillStyle=clrs[i%3];cx.font='12px VT323';cx.fillText(chs[Math.floor(Math.random()*chs.length)],i*14,y*14);if(y*14>cv.height&&Math.random()>0.975)drops[i]=0;drops[i]++;});}
setInterval(drawM,55);

// CLOCK
function tick(){document.getElementById('sb-clock').textContent=new Date().toLocaleTimeString('en-GB',{hour12:false})+' | NBI';}
tick();setInterval(tick,1000);

// READING PROGRESS
window.addEventListener('scroll',()=>{
  const s=document.documentElement;
  const pct=(s.scrollTop/(s.scrollHeight-s.clientHeight))*100;
  document.getElementById('progress').style.width=Math.min(pct,100)+'%';
});

// TAG COLOR
const tagClasses=['ptag-c','ptag-m','ptag-y','ptag-o'];
function tagClass(i){return tagClasses[i%tagClasses.length];}

// STRIP FRONTMATTER
function stripFrontmatter(md){
  if(!md.startsWith('---'))return{meta:{},body:md};
  const end=md.indexOf('---',3);
  if(end===-1)return{meta:{},body:md};
  const fm=md.slice(3,end).trim();
  const body=md.slice(end+3).trim();
  const meta={};
  fm.split('\n').forEach(line=>{
    const [k,...v]=line.split(':');
    if(k)meta[k.trim()]=v.join(':').trim();
  });
  return{meta,body};
}

// BUILD TOC
function buildTOC(html){
  const tmp=document.createElement('div');tmp.innerHTML=html;
  const headings=[...tmp.querySelectorAll('h2,h3')];
  if(headings.length<2)return null;
  const list=document.createElement('ul');list.className='toc-list';
  headings.forEach(h=>{
    const id='h-'+h.textContent.toLowerCase().replace(/[^a-z0-9]+/g,'-');
    h.id=id;
    const li=document.createElement('li');
    const a=document.createElement('a');a.href='#'+id;a.textContent=h.textContent;
    if(h.tagName==='H3'){li.className='h3';}
    li.appendChild(a);list.appendChild(li);
  });
  return{list,html:tmp.innerHTML};
}

// ADD COPY BUTTONS TO CODE BLOCKS
function addCopyButtons(el){
  el.querySelectorAll('pre').forEach(pre=>{
    const wrap=document.createElement('div');wrap.className='code-wrap';
    pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(pre);
    const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='COPY';
    btn.onclick=()=>{
      navigator.clipboard.writeText(pre.innerText).then(()=>{
        btn.textContent='COPIED';btn.classList.add('copied');
        setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('copied');},2000);
      });
    };
    wrap.appendChild(btn);
  });
}

// FORMAT DATE
function formatDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}).toUpperCase();}

// LOAD POST
async function loadPost(){
  const params=new URLSearchParams(location.search);
  const slug=params.get('slug');
  if(!slug){showError();return;}

  try{
    // Load manifest to get metadata
    const mRes=await fetch('posts/manifest.json');
    const manifest=await mRes.json();
    const meta=manifest.find(p=>p.slug===slug);

    // Load markdown file
    const mdRes=await fetch(`posts/${slug}.md`);
    if(!mdRes.ok)throw new Error('not found');
    const raw=await mdRes.text();

    const{meta:fm,body}=stripFrontmatter(raw);
    const postMeta=meta||{title:fm.title||slug,date:fm.date||'',tags:(fm.tags||'').split(',').map(t=>t.trim())};

    // Configure marked
    marked.setOptions({breaks:true,gfm:true});

    // Parse markdown
    let html=marked.parse(body);

    // Build TOC
    const toc=buildTOC(html);
    if(toc){
      html=toc.html;
      const tocEl=document.getElementById('toc');
      tocEl.style.display='block';
      const heading=document.createElement('ul');
      tocEl.appendChild(toc.list);
    }

    // Render header
    const tags=postMeta.tags||[];
    document.getElementById('post-header').innerHTML=`
      <a href="index.html" class="back-link">&nbsp;BACK TO BLOG</a>
      <div class="post-header-tags">${tags.map((t,i)=>`<span class="ptag ${tagClass(i)}">${t}</span>`).join('')}</div>
      <div class="post-header-title">${postMeta.title}</div>
      <div class="post-header-meta">
        <span>📅 <em>${formatDate(postMeta.date)}</em></span>
        <span>📖 <em>${Math.ceil(body.split(' ').length/200)} MIN READ</em></span>
      </div>
    `;

    // Render content
    const contentEl=document.getElementById('post-content');
    contentEl.innerHTML=html;

    // Syntax highlight
    contentEl.querySelectorAll('pre code').forEach(el=>{hljs.highlightElement(el);});

    // Add copy buttons
    addCopyButtons(contentEl);

    // Update page title + status bar
    document.title=`${postMeta.title} // XIHACKS`;
    document.getElementById('sb-title').textContent=`// ${postMeta.title.toUpperCase()}`;

    // Show post
    document.getElementById('loading').style.display='none';
    document.getElementById('post-wrap').style.display='block';

  }catch(e){
    showError();
  }
}

function showError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error').style.display='block';
}

// Smooth scroll for TOC links
document.addEventListener('click',e=>{
  if(e.target.matches('.toc-list a')){
    e.preventDefault();
    const id=e.target.getAttribute('href').slice(1);
    document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
  }
});

loadPost();

// GLITCH FLICKER
setInterval(()=>{if(Math.random()>0.95){document.body.style.filter='brightness(1.06)';setTimeout(()=>document.body.style.filter='',70);}},2500);
</script>
</body>
</html>
